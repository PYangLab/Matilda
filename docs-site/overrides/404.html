{% extends "base.html" %}

{% block content %}
<style>
  .mto-404 { text-align: center; max-width: 38rem; margin: 4rem auto 6rem; }
  .mto-404 .glyph {
    font-size: 4.5rem; line-height: 1; margin-bottom: 1rem;
    color: #0f172a;
  }
  [data-md-color-scheme="slate"] .mto-404 .glyph { color: #f8fafc; }
  .mto-404 h1 {
    font-size: 2.0rem; font-weight: 700; margin: 0 0 0.5rem;
    color: #0f172a;
  }
  [data-md-color-scheme="slate"] .mto-404 h1 { color: #f8fafc; }
  .mto-404 p { color: var(--md-default-fg-color--light); margin-bottom: 2rem; }
  .mto-404 .mto-links {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0.6rem;
    margin: 0 auto;
  }
  .mto-404 .mto-links a {
    padding: 0.7rem 1rem;
    border: 1px solid var(--md-default-fg-color--lightest);
    border-radius: 0.5rem;
    text-decoration: none;
    color: var(--md-default-fg-color);
    background: var(--md-default-bg-color);
    transition: all 180ms ease;
    font-weight: 500;
    font-size: 0.86rem;
  }
  /* Blue accent only (DESIGN_SYSTEM §1.3, no violet/pink). --md-accent-fg-color
     is pinned to the brand blue in extra.css, light + dark. */
  .mto-404 .mto-links a:hover {
    transform: translateY(-2px);
    border-color: var(--md-accent-fg-color);
    color: var(--md-accent-fg-color);
    box-shadow: 0 6px 12px rgba(0,0,0,0.08), 0 16px 32px rgba(0,0,0,0.10);
  }
</style>

<div class="mto-404">
  <div class="glyph">404</div>
  <h1>Gene not expressed in this cell type</h1>
  <p>
    That page isn&rsquo;t in this dataset. Use the links below,
    or hit <kbd>/</kbd> to search the whole site.
  </p>
  <div class="mto-links">
    <a href="{{ base_url }}/">🏠 Home</a>
    <a href="https://github.com/PYangLab/Matilda/issues/new">🐛 Report a broken link</a>
  </div>
</div>
{% endblock %}

{% block footer %}{% endblock %}
